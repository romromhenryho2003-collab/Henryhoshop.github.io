<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<title>PRO SHOP</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

/* TOP BAR */

.topbar{
background:#0a68ff;
color:white;
display:flex;
justify-content:flex-end;
align-items:center;
gap:15px;
padding:10px;
}

.topbar input{
padding:6px;
border:none;
border-radius:4px;
}

/* SOCIAL LEFT */

.social{
position:fixed;
left:0;
top:150px;
display:flex;
flex-direction:column;
}

.social a{
color:white;
text-decoration:none;
padding:12px;
font-weight:bold;
width:110px;
}

.fb{background:#1877f2;}
.yt{background:#ff0000;}
.tt{background:#000;}
.ig{background:#e4405f;}

/* COVER */

.cover{
height:300px;
background:url("https://picsum.photos/1200/300");
background-size:cover;
position:relative;
}

.avatar{
width:150px;
height:150px;
border-radius:50%;
border:5px solid white;
background:url("https://picsum.photos/200");
background-size:cover;
position:absolute;
left:50%;
bottom:-75px;
transform:translateX(-50%);
}

/* PRODUCTS */

.products{
margin-top:120px;
padding:20px;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
}

.product{
background:white;
padding:10px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.product img{
width:100%;
}

.price{
color:red;
font-weight:bold;
}

.old{
text-decoration:line-through;
color:gray;
font-size:14px;
}

.rating{
color:orange;
font-size:14px;
}

/* CHAT */

.chat{
position:fixed;
bottom:20px;
right:20px;
}

.chat-box{
display:none;
background:white;
padding:15px;
width:250px;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
margin-bottom:10px;
}

.chat-btn{
background:#0078ff;
color:white;
padding:10px 15px;
border-radius:30px;
cursor:pointer;
}

.chat-box input{
width:100%;
padding:5px;
margin-top:5px;
}

/* FOOTER */

footer{
background:#111;
